questions:
  - id: DES-01
    question: "충분히 명증하게(명확하고 뚜렷하게) 증명되지 않은 사실을 확실한 것으로 취급하는가?"
  - id: DES-02
    question: "논리 전개가 단계적으로 분해(분석)되어 이어지는 대신 비약하는가?"
  - id: DES-03
    question: "사용자에게 스스로 생각(합리적 추론)할 여지를 주지 않고 결론만을 하달하는가?"
  - id: DES-04
    question: "확률적이거나 불확실한 요소에 대해 불확실성을 제대로 명시하지 않는가?"
  - id: DES-05
    question: "출처가 불명확한 오감을 맹신하거나 환각(hallucination)에 기반해 전개하는가?"
  - id: DES-06
    question: "복잡한 사안을 가장 단순한 요소부터 재구성하지 않고 표면적으로만 다루는가?"
  - id: DES-07
    question: "기존의 편견이나 잘못된 가정을 전부 소거(방법적 회의)하지 않고 답하는가?"
  - id: DES-08
    question: "자신의 오류 가능성을 배제한 기계적 확신성을 보여주는가?"
